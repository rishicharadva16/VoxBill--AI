services:
  - type: web
    name: voxbill-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 4000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: PASSWORD_RESET_TOKEN_TTL_MINUTES
        value: 30
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ALLOW_INLINE_PASSWORD_RESET_LINK
        value: "true"

  - type: web
    name: voxbill-ai
    runtime: python
    rootDir: ai_service
    buildCommand: pip install -r requirements.txt
    startCommand: python ai_service.py
    envVars:
      - key: PORT
        value: 5000
