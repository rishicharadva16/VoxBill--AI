<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | VoxBill AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-primary: #0d9488;
            --accent-secondary: #7c3aed;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-border: rgba(15, 23, 42, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: var(--text-main);
            background:
                radial-gradient(circle at 16% 18%, rgba(13, 148, 136, 0.18) 0%, transparent 46%),
                radial-gradient(circle at 84% 82%, rgba(124, 58, 237, 0.18) 0%, transparent 48%),
                linear-gradient(135deg, #ecfeff 0%, #eff6ff 42%, #f8fafc 100%);
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 30px 64px -30px rgba(13, 148, 136, 0.3);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #0f172a 0%, #0d9488 62%, #7c3aed 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 0.93rem;
            line-height: 1.5;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.86rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            background: #f8fafc;
            padding: 12px;
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 14px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.14);
            background: #fff;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 12px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            margin-top: 4px;
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.75;
        }

        .msg {
            margin-top: 14px;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.87rem;
            display: none;
        }

        .msg.success {
            display: block;
            color: #166534;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.25);
        }

        .msg.error {
            display: block;
            color: #991b1b;
            background: rgba(248, 113, 113, 0.14);
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        .back-link {
            display: inline-block;
            margin-top: 18px;
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 0.87rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>Reset Password</h1>
        <p class="subtitle">Set a new password for your manager account.</p>

        <form id="resetForm">
            <label for="password">New Password</label>
            <input id="password" type="password" minlength="6" placeholder="At least 6 characters" required>

            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" type="password" minlength="6" placeholder="Retype new password" required>

            <button class="btn" id="submitBtn" type="submit">Update Password</button>
        </form>

        <div id="msg" class="msg"></div>
        <a class="back-link" href="login.html">Back to Login</a>
    </main>

    <script src="../js/api.js"></script>
    <script>
        const form = document.getElementById('resetForm');
        const msg = document.getElementById('msg');
        const submitBtn = document.getElementById('submitBtn');
        const token = new URLSearchParams(window.location.search).get('token') || '';

        function setMessage(text, type) {
            msg.className = `msg ${type}`;
            msg.textContent = text;
        }

        if (!token) {
            setMessage('Reset token is missing. Please request a new reset link.', 'error');
            submitBtn.disabled = true;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!token) return;
            msg.className = 'msg';

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!password || password.length < 6) {
                setMessage('Password must be at least 6 characters.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                setMessage('Passwords do not match.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';

            try {
                const res = await VoxAPI.resetPassword(token, password);
                if (res.ok) {
                    setMessage('Password updated successfully. Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1400);
                } else {
                    throw new Error((res.data && (res.data.message || res.data.error)) || 'Unable to update password.');
                }
            } catch (err) {
                setMessage(err.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
            }
        });
    </script>
</body>

</html>
