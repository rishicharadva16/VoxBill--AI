<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | VoxBill AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-primary: #0d9488;
            --accent-secondary: #7c3aed;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-border: rgba(15, 23, 42, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: var(--text-main);
            background:
                radial-gradient(circle at 12% 15%, rgba(13, 148, 136, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 86% 82%, rgba(124, 58, 237, 0.2) 0%, transparent 48%),
                linear-gradient(135deg, #ecfeff 0%, #eff6ff 40%, #f8fafc 100%);
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 430px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 30px 64px -30px rgba(13, 148, 136, 0.3);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #0f172a 0%, #0d9488 62%, #7c3aed 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 0.93rem;
            line-height: 1.5;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.86rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            background: #f8fafc;
            padding: 12px;
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 16px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.14);
            background: #fff;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 12px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.75;
        }

        .msg {
            margin-top: 14px;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.87rem;
            display: none;
        }

        .msg.success {
            display: block;
            color: #166534;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.25);
        }

        .msg.error {
            display: block;
            color: #991b1b;
            background: rgba(248, 113, 113, 0.14);
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        .back-link {
            display: inline-block;
            margin-top: 18px;
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 0.87rem;
            font-weight: 600;
        }

        .inline-link-box {
            margin-top: 12px;
            border: 1px solid rgba(13, 148, 136, 0.28);
            border-radius: 10px;
            background: rgba(13, 148, 136, 0.08);
            padding: 10px;
            display: none;
        }

        .inline-link-box p {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .inline-link-url {
            display: block;
            color: #0f172a;
            word-break: break-all;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .inline-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .inline-actions button {
            border: 1px solid var(--card-border);
            border-radius: 8px;
            background: #fff;
            color: var(--text-main);
            cursor: pointer;
            font-size: 0.78rem;
            padding: 6px 10px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>Forgot Password</h1>
        <p class="subtitle">Enter your manager email or username and generate a secure reset link.</p>

        <form id="forgotForm">
            <label for="email">Email or Username</label>
            <input id="email" type="text" placeholder="name@restaurant.com or username" required>
            <button class="btn" id="submitBtn" type="submit">Send Reset Link</button>
        </form>

        <div id="msg" class="msg"></div>
        <div id="inlineLinkBox" class="inline-link-box">
            <p>Use this one-time reset link now:</p>
            <a id="inlineResetLink" class="inline-link-url" href="#" target="_blank" rel="noopener"></a>
            <div class="inline-actions">
                <button type="button" id="openResetBtn">Open Link</button>
                <button type="button" id="copyResetBtn">Copy Link</button>
            </div>
        </div>
        <a class="back-link" href="login.html">Back to Login</a>
    </main>

    <script src="../js/api.js"></script>
    <script>
        const form = document.getElementById('forgotForm');
        const msg = document.getElementById('msg');
        const submitBtn = document.getElementById('submitBtn');
        const inlineLinkBox = document.getElementById('inlineLinkBox');
        const inlineResetLink = document.getElementById('inlineResetLink');
        const openResetBtn = document.getElementById('openResetBtn');
        const copyResetBtn = document.getElementById('copyResetBtn');

        function setMessage(text, type) {
            msg.className = `msg ${type}`;
            msg.textContent = text;
        }

        function setInlineResetLink(link) {
            if (!link) {
                inlineLinkBox.style.display = 'none';
                inlineResetLink.textContent = '';
                inlineResetLink.href = '#';
                return;
            }
            inlineResetLink.textContent = link;
            inlineResetLink.href = link;
            inlineLinkBox.style.display = 'block';
        }

        openResetBtn.addEventListener('click', () => {
            if (inlineResetLink.href && inlineResetLink.href !== '#') {
                window.open(inlineResetLink.href, '_blank', 'noopener');
            }
        });

        copyResetBtn.addEventListener('click', async () => {
            const link = inlineResetLink.textContent || '';
            if (!link) return;
            try {
                await navigator.clipboard.writeText(link);
                setMessage('Reset link copied.', 'success');
            } catch (e) {
                setMessage('Copy failed. Select and copy the link manually.', 'error');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.className = 'msg';
            setInlineResetLink('');
            const email = document.getElementById('email').value.trim();

            if (!email) {
                setMessage('Please enter email or username.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const res = await VoxAPI.forgotPassword(email);
                if (res.ok) {
                    const info = (res.data && res.data.message) || 'If the account exists, a password reset link has been sent.';
                    setMessage(info, 'success');
                    if (res.data && res.data.resetLink) {
                        setInlineResetLink(res.data.resetLink);
                    } else {
                        setMessage('No reset link returned. Restart backend and use an existing manager email/username.', 'error');
                    }
                } else {
                    throw new Error((res.data && (res.data.message || res.data.error)) || 'Unable to send reset link.');
                }
            } catch (err) {
                setMessage(err.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>

</html>
