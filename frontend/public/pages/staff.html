<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management – VoxBill</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css?v=2">
    <link rel="stylesheet" href="../css/pages.css">
</head>

<body>
    <div id="sidebarMount"></div>

    <main class="main" id="main">
        <div id="topbarMount"></div>
        <div class="content-wrapper">
            <div class="container">

                <!-- Page Header -->
                <div class="page-header">
                    <div>
                        <div class="section-label"><i class="fa-solid fa-users-gear"></i> Organization</div>
                        <h1 class="section-title">Staff Management</h1>
                        <p class="section-subtitle">Manage your restaurant staff accounts and roles. Waiters can only
                            access the dashboard and voice ordering.</p>
                    </div>
                    <div class="header-actions">
                        <button class="btn-primary" id="addStaffBtn">
                            <i class="fa-solid fa-user-plus"></i> Add Staff
                        </button>
                    </div>
                </div>

                <!-- Staff Table -->
                <div class="card table-card">
                    <table class="data-table" id="staffTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Waiter ID</th>
                                <th>Role</th>
                                <th>Joined</th>
                                <th class="center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="staffBody"></tbody>
                    </table>
                    <div class="table-empty" id="staffEmpty" style="display:none">
                        <div style="
                            display:flex; flex-direction:column;
                            align-items:center; justify-content:center;
                            padding:3rem 1rem; text-align:center;
                            gap:0.75rem;">
                          <div style="
                              width:56px; height:56px; border-radius:50%;
                              background:var(--success-dim);
                              border:1.5px solid rgba(34,197,94,0.2);
                              display:flex; align-items:center;
                              justify-content:center; font-size:1.5rem;
                              color:var(--success);">
                            <i class="fa-solid fa-users"></i>
                          </div>
                          <div>
                            <p style="font-size:1rem; font-weight:600;
                                color:var(--text); margin-bottom:0.25rem;">
                              No staff added yet
                            </p>
                            <p style="font-size:0.85rem;
                                color:var(--text-muted);">
                              Add your first waiter to get started
                            </p>
                          </div>
                          <button class="btn-primary" id="addStaffEmptyBtn">
                            <i class="fa-solid fa-plus"></i> Add Waiter
                          </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Add Staff Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box card">
            <div class="modal-header">
                <h3>Add New Staff Member</h3>
                <button class="modal-close" id="modalClose"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="field-group">
                    <label>Full Name *</label>
                    <input type="text" id="sName" class="form-input" placeholder="e.g. Ramesh Kumar">
                </div>
                <div class="field-group">
                    <label>Waiter ID (Username) *</label>
                    <input type="text" id="sUsername" class="form-input" placeholder="e.g. rahul01">
                </div>
                <div class="field-group">
                    <label>Email Address (Optional)</label>
                    <input type="email" id="sEmail" class="form-input" placeholder="waiter@restaurant.com">
                </div>
                <div class="field-row">
                    <div class="field-group">
                        <label>Password *</label>
                        <input type="password" id="sPassword" class="form-input" placeholder="••••••••">
                    </div>
                    <div class="field-group">
                        <label>Role</label>
                        <select id="sRole" class="form-input" disabled>
                            <option value="waiter">Waiter (Default)</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="modalCancel">Cancel</button>
                <button class="btn-primary" id="modalSave"><i class="fa-solid fa-check"></i> Create Account</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/shared.js"></script>
    <script src="../js/global.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('sidebarMount').innerHTML = VB.buildSidebar('Staff');
            document.getElementById('topbarMount').innerHTML = VB.buildTopbar('Staff Management');
            VB.initSidebarBehavior();
            VB.initOfflineBanner();
            VB.initGlobalSearch();
            VB.initManagerVoice();
            VB.initSSENotifications();

            const body = document.getElementById('staffBody');
            const emptyEl = document.getElementById('staffEmpty');
            const modal = document.getElementById('modalOverlay');

            function showStaffSkeleton() {
                const grid = document.getElementById('staffGrid')
                    || document.getElementById('staffList')
                    || document.getElementById('staffBody');
                if (!grid) return;
                grid.innerHTML = Array(4).fill('').map(() => `
                  <tr><td colspan="6">
                    <div class="card" style="padding:1rem; display:flex; align-items:center; gap:1rem; border:none; background:transparent;">
                      <div class="skeleton sk-circle"></div>
                      <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
                        <div class="skeleton sk-line" style="width:120px;"></div>
                        <div class="skeleton sk-line-sm" style="width:80px;"></div>
                      </div>
                    </div>
                  </td></tr>`).join('');
            }

            /* ── Fetch & Render Staff ── */
            async function loadStaff() {
                showStaffSkeleton();
                const res = await VoxAPI.getStaff();

                if (!res.ok) {
                    VB.showToast('Failed to load staff.', 'error');
                    return;
                }

                const staff = res.data.data || [];
                if (staff.length === 0) {
                    body.innerHTML = '';
                    emptyEl.style.display = 'flex';

                    const emptyBtn = document.getElementById(
                        'addStaffEmptyBtn');
                    if (emptyBtn) {
                        emptyBtn.addEventListener('click', () => {
                            document.getElementById('addStaffBtn')
                                .click();
                        });
                    }
                    return;
                }
                emptyEl.style.display = 'none';

                body.innerHTML = staff.map((u, idx) => {
                    const date = new Date(u.createdAt).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
                    const currentUser = VoxAPI.getUser();
                    const isSelf = currentUser &&
                        (String(currentUser.id) === String(u._id) ||
                            String(currentUser._id) === String(u._id));

                    return `
                <tr>
                    <td class="row-num">${idx + 1}</td>
                    <td style="font-weight: 600;">${u.name} ${isSelf ? '<span class="label-me">(You)</span>' : ''}</td>
                    <td>${u.username || u.email}</td>
                    <td><span class="role-badge role-${u.role}">${u.role.charAt(0).toUpperCase() + u.role.slice(1)}</span></td>
                    <td>${date}</td>
                    <td class="center">
                        <div class="row-actions">
                            ${u.role !== 'manager' ? `
                                <button class="action-btn del-btn" data-id="${u._id}" title="Delete Account">
                                    <i class="fa-solid fa-user-minus"></i>
                                </button>
                            ` : '<i class="fa-solid fa-lock" title="Manager Protected" style="opacity:0.3"></i>'}
                        </div>
                    </td>
                </tr>
            `;
                }).join('');

                body.querySelectorAll('.del-btn').forEach(btn => {
                    btn.addEventListener('click', () => deleteStaff(btn.dataset.id));
                });
            }

            /* ── Modal Controls ── */
            document.getElementById('addStaffBtn').addEventListener('click', () => {
                modal.classList.add('active');
                document.getElementById('sName').value = '';
                document.getElementById('sUsername').value = '';
                document.getElementById('sEmail').value = '';
                document.getElementById('sPassword').value = '';

                // Clear any leftover error styles
                ['sName', 'sUsername', 'sPassword'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.style.borderColor = '';
                        el.addEventListener('input', () => el.style.borderColor = '');
                    }
                });
            });

            const closeModal = () => modal.classList.remove('active');
            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('modalCancel').addEventListener('click', closeModal);

            document.getElementById('modalSave').addEventListener('click', async () => {
                const name = document.getElementById('sName').value.trim();
                const username = document.getElementById('sUsername').value.trim();
                const email = document.getElementById('sEmail').value.trim();
                const password = document.getElementById('sPassword').value.trim();

                if (!name || !username || !password) {
                    VB.showToast('Name, Waiter ID and Password are required.', 'error');
                    return;
                }

                function validateStaffForm() {
                    let valid = true;
                    const nameEl = document.getElementById('sName');
                    const userEl = document.getElementById('sUsername');
                    const passEl = document.getElementById('sPassword');

                    if (nameEl && !nameEl.value.trim()) {
                        nameEl.style.borderColor = 'var(--error)';
                        valid = false;
                        VB.showToast('Name is required', 'error');
                    }
                    if (userEl && !userEl.value.trim()) {
                        userEl.style.borderColor = 'var(--error)';
                        valid = false;
                        VB.showToast('Waiter ID is required', 'error');
                    }
                    if (passEl && passEl.value.length < 6) {
                        passEl.style.borderColor = 'var(--error)';
                        valid = false;
                        VB.showToast('Password must be 6+ characters', 'error');
                    }
                    return valid;
                }

                if (!validateStaffForm()) return;

                const res = await VoxAPI.createStaff({ name, username, email, password });
                if (res.ok) {
                    VB.showToast('Staff member added!');
                    closeModal();
                    loadStaff();
                } else {
                    VB.showToast(res.data.message || 'Error creating account', 'error');
                }
            });

            /* ── Delete Staff ── */
            async function deleteStaff(id) {
                // Find waiter name if possible for better message
                const row = body.querySelector(`button[data-id="${id}"]`)?.closest('tr');
                const name = row ? row.cells[1].innerText.replace('(You)', '').trim() : 'this staff member';
                // Also capture username from the row for undo
                const usernameCell = row ? row.cells[2].innerText.trim() : '';

                const ok = await VB.showConfirm({
                    title: `Remove ${name}?`,
                    message: 'This waiter account will be permanently deleted.',
                    confirmText: 'Remove',
                    cancelText: 'Cancel',
                    type: 'danger'
                });
                if (!ok) return;

                const res = await VoxAPI.deleteStaff(id);
                if (res.ok) {
                    // Capture name/username before clearing DOM
                    const deletedName = name;
                    const deletedUsername = usernameCell;
                    VB.showUndoToast(
                        `${deletedName} removed`,
                        async () => {
                            await VoxAPI.createStaff({
                                name: deletedName,
                                username: deletedUsername,
                                password: '000000'
                            });
                            loadStaff();
                            VB.showToast(
                                'Staff restored. Reset their password.',
                                'info');
                        }
                    );
                    loadStaff();
                } else {
                    VB.showToast('Failed to delete staff.', 'error');
                }
            }

            // Initial load
            loadStaff();
        });
    </script>
    <style>
        .label-me {
            font-size: 0.7rem;
            color: var(--accent);
            margin-left: 5px;
            opacity: 0.8;
        }

        .role-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .role-manager {
            color: #8B5CF6;
            border-color: rgba(139, 92, 246, 0.3);
            background: rgba(139, 92, 246, 0.1);
        }

        .role-waiter {
            color: #22D3EE;
            border-color: rgba(34, 211, 238, 0.3);
            background: rgba(34, 211, 238, 0.1);
        }
    </style>
</body>

</html>
