services:
  - type: web
    name: voxbill-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 4000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: voxbill-ai
    runtime: python
    rootDir: ai_service
    buildCommand: pip install -r requirements.txt
    startCommand: python ai_service.py
    envVars:
      - key: PORT
        value: 5000
